<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — ShopMart</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cart">

  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">🛍️ ShopMart</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="cart.html" class="cart-link">
          🛒 Cart
          <span id="cart-badge"></span>
        </a>
        <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
      </div>
    </div>
  </nav>

  <main>
    <div class="cart-layout">

      <!-- Items column -->
      <div>
        <div class="cart-header">
          <h1 class="section-title" style="margin:0">Shopping Cart</h1>
          <button class="btn btn-outline" onclick="cartClear()">Clear Cart</button>
        </div>
        <div id="cart-items"></div>
      </div>

      <!-- Summary column -->
      <div id="cart-summary">
        <div class="cart-summary">
          <h2>Order Summary</h2>
          <div class="summary-row">
            <span>Items</span>
            <span id="item-count">0</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="cart-total">$0.00</span>
          </div>
          <button class="btn btn-primary" onclick="cartCheckout()">Checkout →</button>
          <a class="btn btn-outline" href="index.html">Continue Shopping</a>
        </div>
      </div>

    </div>
  </main>

  <footer>© 2026 ShopMart. All rights reserved.</footer>

  <div id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
